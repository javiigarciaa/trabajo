<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Agradece en compañía</title>
  <link rel="stylesheet" href="styles2.css" />
</head>
<body>
  <header class="top-bar">
    <div class="logo">AGRADECE EN COMPAÑÍA</div>
    <nav class="nav-menu">
      <a href="#" class="active">Agradecer</a>
      <a href="#">Recibir</a>
      <a href="#">Cerrar Sesión</a>
    </nav>
  </header>

  <main class="main-container">
    <section class="card">
      <h1 class="card-title">Agradecer</h1>

      <form class="thanks-form">
        <div class="form-group">
          <label for="para">para</label>
          <select id="para" name="para">
            <option value="">Selecciona un nombre</option>
            <option value="Javier García">Javier García</option>
            <option value="Juan">Juan</option>
            <option value="María">María</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mensaje">quiero agradecerte</label>
          <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe aquí tu mensaje de agradecimiento..."></textarea>
        </div>

        <button type="submit" class="btn-enviar">ENVIAR</button>
      </form>
    </section>
  </main>
</body>
</html>
